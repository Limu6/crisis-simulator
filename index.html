<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crisis Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

    <header id="header">
        <h1>Crisis Management</h1>
        <p class="subtitle">Strategic Command Console</p>
    </header>

    <section id="crisisPanel">

        <!-- Stability bar (centered, symmetric, smooth) -->
        <div id="stabilityContainer">
            <div id="stabilityBar"></div>
        </div>

        <!-- Crisis text -->
        <div id="crisisCard">
            <h2 id="crisisPhase">New Game</h2>
            <div id="crisisAnimation" class="hidden"></div>
            <p id="crisisText">Press Start to begin.</p>
        </div>

        <p id="advisorPrompt"></p>

        <!-- Decision tiles -->
        <div id="decisionGrid" class="hidden">

            <button class="decision aggressive" onclick="handleDecision('aggressive')">
                <h3>Aggressive</h3>
                <p id="exp-aggressive"></p>
            </button>

            <button class="decision diplomatic" onclick="handleDecision('diplomatic')">
                <h3>Diplomatic</h3>
                <p id="exp-diplomatic"></p>
            </button>

            <button class="decision investigative" onclick="handleDecision('investigative')">
                <h3>Investigative</h3>
                <p id="exp-investigative"></p>
            </button>

            <button class="decision delay" onclick="handleDecision('delay')">
                <h3>Delay</h3>
                <p id="exp-delay"></p>
            </button>

        </div>

        <!-- Start / Continue button -->
<button id="continueBtn" onclick="startNewCrisis()">Start</button>

    </section>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
